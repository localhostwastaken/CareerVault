services:
  - type: web
    name: careervault-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter          # upgrade to standard for more RAM (sentence-transformers needs ~1 GB)
    healthCheckPath: /api/v1/health

    envVars:
      # ── Static config ───────────────────────────────────────────────────────
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "9900"
      - key: WORKER
        value: "true"
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 7d
      - key: AI_SERVICE_URL
        value: http://localhost:9910   # internal; same container
      - key: KEY_MANAGEMENT_DRIVER
        value: local
      - key: BLOCKCHAIN_DRIVER
        value: local
      - key: PAYMENT_DRIVER
        value: mock
      - key: EMAIL_DRIVER
        value: console
      - key: STORAGE_DRIVER
        value: local
      - key: STORAGE_LOCAL_DIR
        value: /app/server/storage    # mount a Render disk here for persistence

      # ── Secrets — set these in the Render dashboard, never commit values ────
      - key: DATABASE_URL            # Supabase transaction pooler (port 6543)
        sync: false
      - key: DIRECT_URL              # Supabase session pooler (port 5432) — for migrations
        sync: false
      - key: CORS_ORIGIN             # your Vercel frontend URL, e.g. https://careervault.vercel.app
        sync: false
      - key: JWT_PRIVATE_KEY         # contents of server/keys/jwt_private.pem with \n escaped as \\n
        sync: false
      - key: JWT_PUBLIC_KEY          # contents of server/keys/jwt_public.pem with \n escaped as \\n
        sync: false
      - key: KMS_MASTER_KEY          # 32-byte hex string (openssl rand -hex 32)
        sync: false
      - key: GROQ_API_KEY            # optional — enables LLM skill extraction
        sync: false
