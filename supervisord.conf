[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0

[program:nestjs]
command=node /app/server/dist/main.js
directory=/app/server
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:ai-service]
; Bind to loopback only — NestJS calls it internally, never exposed externally
command=uvicorn app.main:app --host 127.0.0.1 --port 9910 --workers 1
directory=/app/ai-service
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
